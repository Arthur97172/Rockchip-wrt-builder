name: 📦 Build ImmortalWrt Rockchip-25.12.x

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择luci版本"
        required: false
        default: "25.12.0"
        type: choice
        options:
          - '25.12.0'
      profile:
        type: choice
        description: |
          输入 软路由型号 可选值如下：
        options:
          - 9tripod_x3568-v4
          - ariaboard_photonicat
          - armsom_sige3
          - armsom_sige7
          - cyber_cyber3588-aib
          - ezpro_mrkaio-m68s
          - firefly_roc-rk3328-cc
          - firefly_roc-rk3568-pc
          - friendlyarm_nanopc-t4
          - friendlyarm_nanopc-t6
          - friendlyarm_nanopi-r2c
          - friendlyarm_nanopi-r2c-plus
          - friendlyarm_nanopi-r2s
          - friendlyarm_nanopi-r3s
          - friendlyarm_nanopi-r4s
          - friendlyarm_nanopi-r4se
          - friendlyarm_nanopi-r4s-enterprise
          - friendlyarm_nanopi-r5c
          - friendlyarm_nanopi-r5s
          - friendlyarm_nanopi-r6c
          - friendlyarm_nanopi-r6s
          - huake_guangmiao-g4c
          - linkease_easepi-r1
          - lunzn_fastrhino-r66s
          - lunzn_fastrhino-r68s
          - lyt_t68m
          - mmbox_anas3035
          - nlnet_xiguapi-v3
          - pine64_rock64
          - pine64_rockpro64
          - radxa_cm3-io
          - radxa_e25
          - radxa_e52c
          - radxa_rock-3a
          - radxa_rock-3b
          - radxa_rock-3c
          - radxa_rock-4c-plus
          - radxa_rock-4se
          - radxa_rock-5-itx
          - radxa_rock-5a
          - radxa_rock-5b
          - radxa_rock-5b-plus
          - radxa_rock-5c
          - radxa_rock-5t
          - radxa_rock-pi-4a
          - radxa_rock-pi-e
          - radxa_rock-pi-s
          - radxa_zero-3e
          - radxa_zero-3w
          - sinovoip_bpi-r2-pro
          - xunlong_orangepi-5
          - xunlong_orangepi-5-plus
          - xunlong_orangepi-r1-plus
          - xunlong_orangepi-r1-plus-lts
        required: true
        default: 'radxa_rock-5-itx'
      ipaddr:
        description: "请设置软路由的管理地址(注意仅对多网口软路由有效) 格式:192.168.x.1 或 10.x.x.1"
        required: true
        default: "192.168.10.1"
      rootfs_partsize:
        description: '设置软件包大小 单位(MB)'
        required: true
        default: '1024'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/rockchip/build25.sh

      - name: ⚙️ Set custom IP config
        run: |
          sed -i "s/版本号/${{ inputs.luci_version }}/g" files/etc/uci-defaults/99-custom.sh
          sed -i "s/__IPADDR__/${{ inputs.ipaddr }}/g" files/etc/uci-defaults/99-custom.sh
          sed -i "s/VERXXXX/${{ inputs.luci_version }}/g" files/etc/uci-defaults/99-custom.sh
          echo "✅ 配置修改完成"

      - name: 🔨 Building Rockchip ImmortalWrt 25.12.x
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/rockchip:/home/build/immortalwrt/rockchip" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            immortalwrt/imagebuilder:rockchip-armv8-openwrt-${{ inputs.luci_version }} \
            /bin/bash /home/build/immortalwrt/rockchip/build25.sh

      - name: 📜 Generate release info
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 📡 路由器后台信息

          🏠 后台地址： ${{ inputs.ipaddr }}
          👤 用户名： root
          🔑 密码： 无
          EOF

      - name: 🚀 Upload to Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ImmortalWrt-${{ env.VERSION }}-rockship-armv8-RELEASE
          #name: ImmortWrt-Rockchip
          body_path: ${{ github.workspace }}/router-info.md
          overwrite: true
          files: |
            imagebuilder/bin/targets/rockchip/armv8/*.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
